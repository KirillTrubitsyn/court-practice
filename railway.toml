# Railway конфиг. Нативный Python билд через nixpacks; Dockerfile есть как fallback.
[build]
builder = "NIXPACKS"

[deploy]
# ВАЖНО: Railway exec-ит startCommand напрямую, БЕЗ shell-интерполяции.
# Поэтому `${PORT}` нужно подставлять через явный `sh -c`, иначе uvicorn получит
# литеральную строку и упадёт с "Invalid value for '--port': '${PORT}'".
#
# --proxy-headers + --forwarded-allow-ips=*: Railway терминирует TLS на edge и
# передаёт X-Forwarded-Proto/Host. Без этих флагов uvicorn доверяет только
# 127.0.0.1, поэтому request.url.scheme возвращает http, и OAuth metadata /
# WWW-Authenticate отдают http://-URL — claude.ai отказывается их использовать
# и показывает "Couldn't reach the MCP server".
startCommand = "sh -c 'uvicorn app.server:app --host 0.0.0.0 --port ${PORT:-8000} --proxy-headers --forwarded-allow-ips=*'"
healthcheckPath = "/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5

# Volume для индекса и эмбеддингов. Подключи к сервису через Railway UI:
#   Variables → New Volume → Mount path: /data → Size: 1 GB.
# После создания Volume переменная DATA_DIR=/data выставляется в Variables.
